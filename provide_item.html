<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上架品項 — 10gear 拾光機</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
  <style>
    .provide-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px; box-shadow: var(--shadow-md); margin-bottom: 24px; }
    .provide-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .provide-card p.sub { font-size: 13px; color: var(--t3); margin-bottom: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .notice-box { margin-top: 20px; padding: 14px 16px; border-radius: 12px; background: #fffbeb; border: 1px solid #fde68a; }
    .notice-box p { font-size: 12px; color: #92400e; line-height: 1.7; }
    .my-items-section h2 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
    .item-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); margin-bottom: 8px; font-size: 13px; }
    .item-row__name { font-weight: 600; }
    .item-row__meta { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .state-pill { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
    .state-available  { background: var(--green-bg); color: var(--green); }
    .state-unavailable{ background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .state-rented     { background: var(--blue-bg); color: var(--blue); }
    .auth-msg { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-top: 14px; display: none; }
    .auth-msg--error   { background: var(--red-bg); color: var(--red); border: 1px solid rgba(220,38,38,0.15); display: block; }
    .auth-msg--success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(5,150,105,0.15); display: block; }
  </style>
</head>
<body>
  <header style="background:var(--surface); border-bottom:1px solid var(--border); padding:14px 20px; position:sticky; top:0; z-index:50; height:57px; box-sizing:border-box;">
    <div class="container" style="display:flex; align-items:center; justify-content:space-between; height:100%;">
      <a href="index.html" class="logo" style="text-decoration:none;"><img src="logo.png" alt="10gear" class="logo__img"><div class="logo__names"><span class="logo__zh">拾光機</span><span class="logo__en">10gear</span></div></a>
      <div id="auth-header"></div>
    </div>
  </header>

  <div class="member-page">
  <div class="member-page__inner">
    <!-- ── Sidebar ── -->
    <aside class="member-sidebar">
      <div class="member-sidebar__user">
        <div class="member-sidebar__avatar">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="member-sidebar__name" id="sb-name">—</div>
        <div class="member-sidebar__id" id="sb-id">ID: —</div>
      </div>
      <nav class="member-sidebar__nav">
        <a href="profile.html" class="member-sidebar__tab" style="text-decoration:none;">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          我的帳戶
        </a>
        <a href="edit_profile.html" class="member-sidebar__tab" style="text-decoration:none;">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          修改個人資料
        </a>
        <a href="orders.html" class="member-sidebar__tab" style="text-decoration:none;">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
          我的訂單
        </a>
        <a href="wallet.html" class="member-sidebar__tab" style="text-decoration:none;">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/><circle cx="16" cy="14" r="1" fill="currentColor"/></svg>
          我的錢包
        </a>
        <div id="provider-tab-wrap" style="display:none;">
          <a href="become_provider.html" class="member-sidebar__tab" id="tab-become-provider" style="text-decoration:none; display:none;">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            申請成為出租方
          </a>
          <a href="provide_item.html" class="member-sidebar__tab active" id="tab-provide-item" style="text-decoration:none; display:none;">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            上架品項
          </a>
        </div>
        <div id="admin-tab-wrap" style="display:none;">
          <a href="admin.html" class="member-sidebar__tab" style="text-decoration:none;">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
            管理後台
          </a>
        </div>
      </nav>
      <button class="member-sidebar__logout" id="btn-logout">登出</button>
    </aside>

    <!-- ── Content ── -->
    <main class="member-main">
      <!-- Upload Form -->
      <div class="provide-card">
        <h1>上架新品項</h1>
        <p class="sub">上架後狀態預設為「審核中」，待管理員審核啟用後才可供租借</p>

        <form id="provide-form" onsubmit="return false;">
          <div class="form-group">
            <label>品項類別 <span class="required">*</span></label>
            <select class="form-input" id="inp-category" required>
              <option value="">請選擇</option>
              <option value="equipment">器材 Equipment</option>
              <option value="accessory">配件 Accessory</option>
            </select>
          </div>
          <div class="form-group" id="subtype-group">
            <label>細項類型 <span class="required">*</span></label>
            <select class="form-input" id="inp-subtype" required>
              <option value="">請先選擇品項類別</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>品項名稱 <span class="required">*</span></label>
              <input type="text" class="form-input" id="inp-name" placeholder="例如：Sony α7 IV" required>
            </div>
            <div class="form-group">
              <label>品牌</label>
              <input type="text" class="form-input" id="inp-brand" placeholder="例如：Sony">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>型號</label>
              <input type="text" class="form-input" id="inp-model" placeholder="例如：ILCE-7M4">
            </div>
            <div class="form-group">
              <label>每日租金 (NT$) <span class="required">*</span></label>
              <input type="number" class="form-input" id="inp-rental" placeholder="例如：1200" min="1" max="99999" required>
            </div>
          </div>
          <div class="form-group">
            <label>品項說明</label>
            <input type="text" class="form-input" id="inp-desc" placeholder="例如：2022年出廠，狀況良好">
          </div>
          <div class="form-group">
            <label>圖片網址</label>
            <input type="text" class="form-input" id="inp-url" placeholder="https://...（選填）">
          </div>
          <div class="form-group">
            <label>規格 Specs</label>
            <div id="specs-editor" style="display:flex;flex-direction:column;gap:8px;"></div>
            <button type="button" id="btn-add-spec" style="margin-top:8px;font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;gap:4px;">＋ 新增規格欄位</button>
          </div>
          <button type="submit" class="btn-primary" id="btn-submit">送出上架申請</button>
        </form>

        <div class="auth-msg" id="msg"></div>

        <div class="notice-box">
          <p>上架後品項狀態為「審核中（unavailable）」，管理員審核通過並設為「available」後即可被租借。</p>
        </div>
      </div>

      <!-- My Items -->
      <div class="my-items-section">
        <h2>我上架的品項</h2>
        <div id="my-items-list"><p style="color:var(--t3); font-size:13px;">載入中⋯</p></div>
      </div>
    </main>
  </div><!-- /member-page__inner -->
  </div><!-- /member-page -->

  <script>
    const STATE_MAP = {
      available:   { label: '可租借', cls: 'state-available' },
      rented:      { label: '出租中', cls: 'state-rented' },
      unavailable: { label: '審核中', cls: 'state-unavailable' },
    };
    const SUBTYPES = {
      equipment: [
        { value: 'digital_camera', label: '數位相機 Digital Camera' },
        { value: 'film_camera',    label: '底片相機 Film Camera' },
        { value: 'instant_camera', label: '拍立得 Instant Camera' },
        { value: 'action_camera',  label: '運動相機 Action Camera' },
        { value: 'drone',          label: '無人機 Drone' },
        { value: 'gimbal',         label: '雲台 Gimbal' },
        { value: 'computer',       label: '電腦 Computer' },
        { value: 'lighting',       label: '燈光 Lighting' },
        { value: 'audio',          label: '音訊 Audio' },
      ],
      accessory: [
        { value: 'lens',    label: '鏡頭 Lens' },
        { value: 'tripod',  label: '腳架 Tripod' },
        { value: 'battery', label: '電池 Battery' },
        { value: 'storage', label: '記憶卡 Storage' },
        { value: 'filter',  label: '濾鏡 Filter' },
      ],
    };

    const user = JSON.parse(localStorage.getItem("lensrent_user") || "null");
    if (!user) { window.location.href = "login.html"; }
    if (!user?.roles?.isProvider) { window.location.href = "become_provider.html"; }

    // Header
    document.getElementById("auth-header").innerHTML =
      `<span class="btn-user-menu"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${user.username}</span>`;

    // Sidebar init
    document.getElementById("sb-name").textContent = user.username;
    document.getElementById("sb-id").textContent   = "ID: " + user.member_id;

    const r = user.roles || {};
    const pt    = document.getElementById("provider-tab-wrap");
    const tabBP = document.getElementById("tab-become-provider");
    const tabPI = document.getElementById("tab-provide-item");
    const at    = document.getElementById("admin-tab-wrap");
    if (pt)    pt.style.display    = "block";
    if (tabBP) tabBP.style.display = r.isProvider ? "none" : "flex";
    if (tabPI) tabPI.style.display = r.isProvider ? "flex" : "none";
    if (at)    at.style.display    = r.isAdmin    ? "block" : "none";

    // Logout
    document.getElementById("btn-logout").addEventListener("click", () => {
      localStorage.removeItem("lensrent_user");
      fetch("api/logout.php", { credentials: "same-origin" }).catch(() => {});
      window.location.href = "index.html";
    });

    // Dynamic subtype dropdown
    document.getElementById("inp-category").addEventListener("change", function() {
      const sel = document.getElementById("inp-subtype");
      sel.innerHTML = '<option value="">請選擇</option>';
      (SUBTYPES[this.value] || []).forEach(o => {
        sel.innerHTML += `<option value="${o.value}">${o.label}</option>`;
      });
    });

    // Specs editor
    function addSpecRow(key = '', value = '') {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:8px;align-items:center;';
      row.innerHTML = `
        <input type="text" class="form-input spec-key" placeholder="規格名稱（例：感光元件）" value="${key}" style="flex:1;min-width:0;">
        <input type="text" class="form-input spec-val" placeholder="內容（例：全片幅）" value="${value}" style="flex:2;min-width:0;">
        <button type="button" style="flex-shrink:0;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--t3);cursor:pointer;font-size:14px;">×</button>
      `;
      row.querySelector('button').addEventListener('click', () => row.remove());
      document.getElementById('specs-editor').appendChild(row);
    }
    document.getElementById('btn-add-spec').addEventListener('click', () => addSpecRow());

    // Msg helper
    const msgEl = document.getElementById("msg");
    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = "auth-msg auth-msg--" + type;
    }

    // Submit
    document.getElementById("provide-form").addEventListener("submit", async () => {
      const specs = {};
      document.querySelectorAll('#specs-editor > div').forEach(row => {
        const k = row.querySelector('.spec-key').value.trim();
        const v = row.querySelector('.spec-val').value.trim();
        if (k) specs[k] = v;
      });

      const payload = {
        item_category: document.getElementById("inp-category").value,
        item_subtype:  document.getElementById("inp-subtype").value,
        name:          document.getElementById("inp-name").value.trim(),
        brand:         document.getElementById("inp-brand").value.trim(),
        model:         document.getElementById("inp-model").value.trim(),
        description:   document.getElementById("inp-desc").value.trim(),
        rental:        Math.round(parseFloat(document.getElementById("inp-rental").value)),
        url:           document.getElementById("inp-url").value.trim(),
        specs:         Object.keys(specs).length > 0 ? specs : null,
      };
      if (!payload.item_category || !payload.name || !payload.rental) {
        showMsg("請填寫品項類別、名稱與租金", "error"); return;
      }
      if (payload.rental > 99999) {
        showMsg("每日租金上限為 NT$ 99,999", "error"); return;
      }
      document.getElementById("btn-submit").disabled = true;
      document.getElementById("btn-submit").textContent = "送出中…";
      try {
        const res  = await fetch("api/provide_item.php", {
          method: "POST", headers: { "Content-Type": "application/json" },
          credentials: "same-origin", body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
          showMsg(data.message, "success");
          document.getElementById("provide-form").reset();
          document.getElementById("specs-editor").innerHTML = "";
          loadMyItems();
        } else if (data.message === "請先登入") {
          localStorage.removeItem("lensrent_user");
          window.location.href = "login.html?redirect=provide_item.html";
        } else {
          showMsg(data.message, "error");
        }
      } catch(e) { showMsg("連線失敗", "error"); }
      document.getElementById("btn-submit").disabled = false;
      document.getElementById("btn-submit").textContent = "送出上架申請";
    });

    // Load my items
    async function loadMyItems() {
      try {
        const res  = await fetch("api/my_items.php", { credentials: "same-origin" });
        const data = await res.json();
        const el   = document.getElementById("my-items-list");
        if (!data.success || data.items.length === 0) {
          el.innerHTML = '<p style="color:var(--t3); font-size:13px;">尚未上架任何品項</p>'; return;
        }
        el.innerHTML = data.items.map(item => {
          const st = STATE_MAP[item.rent_state] || { label: item.rent_state, cls: '' };
          return `<div class="item-row">
            <div>
              <div class="item-row__name">${item.name}</div>
              <div class="item-row__meta">${item.brand || ''} ${item.model || ''} · NT$ ${Number(item.rental).toLocaleString('zh-TW')}/日</div>
            </div>
            <span class="state-pill ${st.cls}">${st.label}</span>
          </div>`;
        }).join("");
      } catch(e) {
        document.getElementById("my-items-list").innerHTML = '<p style="color:var(--t3); font-size:13px;">無法載入品項</p>';
      }
    }
    loadMyItems();
  </script>
</body>
</html>
