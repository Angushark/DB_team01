<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的錢包 — 10gear 拾光機</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* wallet-specific styles only */

    /* ── Balance card ── */
    .balance-card {
      background: linear-gradient(135deg, #92400e 0%, #b45309 60%, #d97706 100%);
      border-radius: 18px; padding: 28px 32px; color: #fff; margin-bottom: 24px;
      position: relative; overflow: hidden;
    }
    .balance-card::after {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(255,255,255,0.06); pointer-events: none;
    }
    .balance-label { font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; margin-bottom: 8px; }
    .balance-amount { font-family: var(--font-mono); font-size: 36px; font-weight: 700; letter-spacing: -1px; }
    .balance-sub { font-size: 12px; opacity: 0.6; margin-top: 6px; }

    /* ── Topup form ── */
    .topup-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px 24px; margin-bottom: 24px;
    }
    .topup-card h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    .topup-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .preset-btn {
      padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--t2); font-size: 13px; cursor: pointer;
      transition: all .15s; font-family: var(--font-mono);
    }
    .preset-btn:hover, .preset-btn.selected {
      border-color: var(--amber); color: var(--amber); background: var(--amber-light);
    }
    .topup-row { display: flex; gap: 10px; }
    .topup-input {
      flex: 1; padding: 9px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg); color: var(--t1); font-size: 14px; outline: none;
      font-family: var(--font-mono); transition: border-color .2s;
    }
    .topup-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(217,119,6,0.1); }
    .topup-msg { font-size: 12px; margin-top: 8px; display: none; }
    .topup-msg.ok  { color: var(--green); display: block; }
    .topup-msg.err { color: var(--red);   display: block; }

    /* ── Transaction list ── */
    .txn-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .txn-card h2 { font-size: 15px; font-weight: 700; padding: 18px 22px 14px; border-bottom: 1px solid var(--border); }
    .txn-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 22px; border-bottom: 1px solid var(--border); transition: background .15s;
    }
    .txn-row:last-child { border-bottom: none; }
    .txn-row:hover { background: var(--bg); }
    .txn-icon {
      width: 36px; height: 36px; border-radius: 10px; display: flex;
      align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; margin-right: 12px;
    }
    .txn-icon--topup    { background: #f0fdf4; }
    .txn-icon--payment  { background: #fef2f2; }
    .txn-icon--refund   { background: #eff6ff; }
    .txn-icon--payout   { background: #fffbeb; }
    .txn-info { flex: 1; min-width: 0; }
    .txn-note { font-size: 13px; font-weight: 600; color: var(--t1); }
    .txn-date { font-size: 11px; color: var(--t3); margin-top: 2px; font-family: var(--font-mono); }
    .txn-amount { font-family: var(--font-mono); font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .txn-amount--in  { color: var(--green); }
    .txn-amount--out { color: var(--red); }
    .txn-empty { text-align: center; padding: 40px; color: var(--t3); font-size: 13px; }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header style="background:var(--surface); border-bottom:1px solid var(--border); padding:14px 20px; position:sticky; top:0; z-index:50; height:57px; box-sizing:border-box;">
    <div class="container" style="display:flex; align-items:center; justify-content:space-between; height:100%;">
      <a href="index.html" class="logo" style="text-decoration:none;">
        <img src="logo.png" alt="10gear" class="logo__img">
        <div class="logo__names">
          <span class="logo__zh">拾光機</span>
          <span class="logo__en">10gear</span>
        </div>
      </a>
      <div id="auth-header"></div>
    </div>
  </header>

  <div class="member-page">
  <div class="member-page__inner">

    <!-- ── Sidebar ── -->
    <aside class="member-sidebar">
      <div class="member-sidebar__user">
        <div class="member-sidebar__avatar">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="member-sidebar__name" id="sb-username">—</div>
        <div class="member-sidebar__id" id="sb-mid">ID: —</div>
      </div>
      <nav class="member-sidebar__nav">
        <a href="profile.html" class="member-sidebar__tab" style="text-decoration:none;">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          我的帳戶
        </a>
        <a href="edit_profile.html" class="member-sidebar__tab" style="text-decoration:none;">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          修改個人資料
        </a>
        <a href="orders.html" class="member-sidebar__tab" style="text-decoration:none;">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
          我的訂單
        </a>
        <a href="wallet.html" class="member-sidebar__tab active" style="text-decoration:none;">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/><circle cx="16" cy="14" r="1" fill="currentColor"/></svg>
          我的錢包
        </a>
        <div id="provider-tab-wrap" style="display:none;">
          <a href="become_provider.html" class="member-sidebar__tab" id="tab-become-provider" style="text-decoration:none; display:none;">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            申請成為出租方
          </a>
          <a href="provide_item.html" class="member-sidebar__tab" id="tab-provide-item" style="text-decoration:none; display:none;">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            上架品項
          </a>
        </div>
        <div id="admin-tab-wrap" style="display:none;">
          <a href="admin.html" class="member-sidebar__tab" style="text-decoration:none;">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
            管理後台
          </a>
        </div>
      </nav>
      <button class="member-sidebar__logout" id="btn-logout">登出</button>
    </aside>

    <!-- ── Main ── -->
    <main class="member-main">
      <h1 style="font-size:22px; font-weight:700; margin-bottom:24px;">我的錢包</h1>

      <!-- Balance card -->
      <div class="balance-card">
        <div class="balance-label">目前餘額</div>
        <div class="balance-amount" id="balance-display">NT$ —</div>
      </div>

      <!-- Top-up -->
      <div class="topup-card">
        <h2>儲值</h2>
        <div class="topup-presets" id="presets">
          <button class="preset-btn" data-amount="500">NT$ 500</button>
          <button class="preset-btn" data-amount="1000">NT$ 1,000</button>
          <button class="preset-btn" data-amount="2000">NT$ 2,000</button>
          <button class="preset-btn" data-amount="5000">NT$ 5,000</button>
        </div>
        <div class="topup-row">
          <input type="number" class="topup-input" id="topup-amount" placeholder="自訂金額" min="1" max="50000">
          <button class="btn-primary" id="btn-topup" style="white-space:nowrap;">確認儲值</button>
        </div>
        <div class="topup-msg" id="topup-msg"></div>
      </div>

      <!-- Transaction history -->
      <div class="txn-card">
        <h2>交易紀錄</h2>
        <div id="txn-list"><div class="txn-empty">載入中⋯</div></div>
      </div>
    </main>
  </div><!-- /member-page__inner -->
  </div><!-- /member-page -->

  <script>
    const TXN_TYPE = {
      topup:   { label: '儲值',   icon: '💰', cls: 'topup' },
      payment: { label: '付款',   icon: '🛒', cls: 'payment' },
      refund:  { label: '退款',   icon: '↩️', cls: 'refund' },
      payout:  { label: '收款',   icon: '💵', cls: 'payout' },
    };

    const fmt = n => `NT$ ${Math.round(Number(n)).toLocaleString('zh-TW')}`;

    // ── Auth ────────────────────────────────────────────────────────────
    const user = JSON.parse(localStorage.getItem("lensrent_user") || "null");
    if (!user) { window.location.href = "login.html"; }

    document.getElementById("sb-username").textContent = user.username;
    document.getElementById("sb-mid").textContent = `ID: ${user.member_id}`;
    document.getElementById("auth-header").innerHTML =
      `<a href="profile.html" class="btn-user-menu" style="text-decoration:none;">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ${user.username}
      </a>`;

    // Show role-based tabs
    const r = user.roles || {};
    const pt    = document.getElementById("provider-tab-wrap");
    const tabBP = document.getElementById("tab-become-provider");
    const tabPI = document.getElementById("tab-provide-item");
    const at    = document.getElementById("admin-tab-wrap");
    if (pt) pt.style.display = "block";

    // Logout
    document.getElementById("btn-logout").addEventListener("click", () => {
      localStorage.removeItem("lensrent_user");
      fetch("api/logout.php", { credentials: "same-origin" }).catch(() => {});
      window.location.href = "index.html";
    });
    if (tabBP) tabBP.style.display = r.isProvider ? "none" : "flex";
    if (tabPI) tabPI.style.display = r.isProvider ? "flex" : "none";
    if (at)    at.style.display    = r.isAdmin    ? "block" : "none";

    // ── Load wallet data ─────────────────────────────────────────────────
    async function loadWallet() {
      try {
        const res  = await fetch("api/wallet.php", { credentials: "same-origin" });
        const data = await res.json();
        if (!data.success) { window.location.href = "login.html"; return; }

        // Update balance
        document.getElementById("balance-display").textContent = fmt(data.balance);

        // Render transactions
        const list = document.getElementById("txn-list");
        if (!data.transactions.length) {
          list.innerHTML = '<div class="txn-empty">尚無交易紀錄</div>';
          return;
        }
        list.innerHTML = data.transactions.map(t => {
          const info   = TXN_TYPE[t.type] || { label: t.type, cls: '' };
          const isIn   = t.amount > 0;
          const amtCls = isIn ? "txn-amount--in" : "txn-amount--out";
          const amtStr = (isIn ? "+" : "") + fmt(Math.abs(t.amount));
          const date   = t.created_at.replace("T", " ").substring(0, 16);
          const orderLink = t.order_id
            ? `<a href="order_detail.html?id=${t.order_id}" style="color:var(--amber);font-size:11px;"> 訂單 #${t.order_id}</a>`
            : "";
          return `
            <div class="txn-row">
              <div class="txn-info">
                <div class="txn-note">${info.label}${orderLink}</div>
                <div class="txn-date">${date} · ${t.note || ''}</div>
              </div>
              <div class="txn-amount ${amtCls}">${amtStr}</div>
            </div>`;
        }).join("");
      } catch(e) {
        document.getElementById("txn-list").innerHTML = '<div class="txn-empty" style="color:var(--red)">載入失敗</div>';
      }
    }
    loadWallet();

    // ── Preset buttons ───────────────────────────────────────────────────
    document.getElementById("presets").addEventListener("click", e => {
      const btn = e.target.closest(".preset-btn");
      if (!btn) return;
      document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      document.getElementById("topup-amount").value = btn.dataset.amount;
    });
    document.getElementById("topup-amount").addEventListener("input", () => {
      document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("selected"));
    });

    // ── Top-up ───────────────────────────────────────────────────────────
    const msgEl = document.getElementById("topup-msg");
    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = "topup-msg " + (type === "ok" ? "ok" : "err");
    }

    document.getElementById("btn-topup").addEventListener("click", async () => {
      const amount = Math.round(parseFloat(document.getElementById("topup-amount").value));
      if (!amount || amount <= 0) { showMsg("請輸入有效金額", "err"); return; }
      if (amount > 50000)         { showMsg("單次儲值上限為 NT$ 50,000", "err"); return; }

      document.getElementById("btn-topup").disabled = true;
      document.getElementById("btn-topup").textContent = "處理中⋯";

      try {
        const res  = await fetch("api/wallet_topup.php", {
          method: "POST", credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ amount }),
        });
        const data = await res.json();
        if (data.success) {
          showMsg(`儲值成功！目前餘額：${fmt(data.balance)}`, "ok");
          document.getElementById("topup-amount").value = "";
          document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("selected"));
          loadWallet();
        } else {
          showMsg(data.message, "err");
        }
      } catch(e) {
        showMsg("連線失敗", "err");
      }

      document.getElementById("btn-topup").disabled = false;
      document.getElementById("btn-topup").textContent = "確認儲值";
    });
  </script>
</body>
</html>
