<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人中心 — LensRent</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
</head>
<body class="auth-page profile-page">

  <!-- Header -->
  <header style="background:var(--surface); border-bottom:1px solid var(--border); padding:14px 20px; position:sticky; top:0; z-index:50; backdrop-filter:blur(16px);">
    <div class="container" style="display:flex; align-items:center; justify-content:space-between;">
      <a href="index.html" class="logo">
        <span class="logo__icon">📷</span>
        <div><div class="logo__text">LensRent</div><div class="logo__sub">攝影器材租賃</div></div>
      </a>
      <div style="display:flex; align-items:center; gap:8px;">
        <a href="index.html" class="btn-login" style="text-decoration:none;">← 回首頁</a>
        <button class="btn-logout" id="btn-logout">登出</button>
      </div>
    </div>
  </header>

  <main style="display:block; padding:32px 16px;">
    <div class="profile-container" id="profile-content">
      <div style="text-align:center; padding:60px 20px; color:var(--t3);">
        <div style="font-size:32px; margin-bottom:8px;">⏳</div>
        <p>載入會員資料中⋯</p>
      </div>
    </div>
  </main>

  <script>
    const ORDER_STATE_MAP = {
      unpaid:    { label: "未付款", cls: "unpaid" },
      confirmed: { label: "訂單成立", cls: "confirmed" },
      completed: { label: "訂單完成", cls: "completed" },
      cancelled: { label: "不成立", cls: "cancelled" },
    };

    function renderProfile(member, orders) {
      const r = member.roles || {};
      const roleBadges = [
        r.isRenter  ? '<span class="role-badge role-badge--renter">租借者 Renter</span>' : '',
        r.isProvider? '<span class="role-badge role-badge--provider">出租方 Provider</span>' : '',
        r.isAdmin   ? '<span class="role-badge role-badge--admin">管理員 Admin</span>' : '',
      ].filter(Boolean).join('');

      let ordersHtml = '';
      if (orders.length === 0) {
        ordersHtml = `<div class="empty-orders"><div class="empty-orders__icon" style="font-size:18px; color:var(--t3);">尚無訂單</div><p>目前沒有租借訂單</p><p style="margin-top:8px;"><a href="index.html" style="color:var(--amber); font-weight:600;">前往瀏覽器材 →</a></p></div>`;
      } else {
        ordersHtml = orders.map(o => {
          const st = ORDER_STATE_MAP[o.order_state] || { label: o.order_state, cls: "unpaid" };
          const itemNames = (o.items || []).map(i => i.name).join("、") || "—";
          return `<div class="order-card">
            <div class="order-card__header">
              <span class="order-card__id">訂單 #${o.order_id}</span>
              <span class="order-state-badge order-state--${st.cls}">${st.label}</span>
            </div>
            <div class="order-card__dates">租借期間：${o.rent_date} → ${o.return_date}</div>
            <div class="order-card__items">品項：${itemNames}</div>
            <div class="order-card__total">${o.total_rental != null ? 'NT$ ' + Number(o.total_rental).toLocaleString('zh-TW') : '—'}</div>
          </div>`;
        }).join('');
      }

      document.getElementById("profile-content").innerHTML = `
        <!-- Profile Card -->
        <div class="profile-card">
          <div class="profile-card__header">
            <div class="profile-card__avatar">
              <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div>
              <h1 class="profile-card__name">${member.username}</h1>
              <p class="profile-card__id">Member ID: ${member.member_id}</p>
              <div class="role-badges" style="margin-top:6px;">${roleBadges}</div>
            </div>
          </div>
          <div class="profile-info-grid">
            <div class="profile-info-item">
              <div class="profile-info-item__label">電子信箱</div>
              <div class="profile-info-item__value">${member.email}</div>
            </div>
            <div class="profile-info-item">
              <div class="profile-info-item__label">聯絡電話</div>
              <div class="profile-info-item__value">${member.phone_number || '未填寫'}</div>
            </div>
            <div class="profile-info-item">
              <div class="profile-info-item__label">註冊日期</div>
              <div class="profile-info-item__value">${member.reg_date}</div>
            </div>
            <div class="profile-info-item">
              <div class="profile-info-item__label">訂單數量</div>
              <div class="profile-info-item__value">${orders.length} 筆</div>
            </div>
          </div>
        </div>

        <!-- Orders -->
        <div>
          <h2 class="orders-section__title">我的租借訂單</h2>
          ${ordersHtml}
        </div>
      `;
    }

    function renderError(text) {
      document.getElementById("profile-content").innerHTML = `
        <div style="text-align:center; padding:60px 20px; color:var(--t3);">
          <div style="font-size:40px; margin-bottom:12px;">🔒</div>
          <p style="font-size:16px; font-weight:600; margin-bottom:8px;">${text}</p>
          <a href="login.html" style="color:var(--amber); font-weight:600;">前往登入 →</a>
        </div>`;
    }

    // Check login state
    const localUser = JSON.parse(localStorage.getItem("lensrent_user") || "null");
    if (!localUser) {
      renderError("請先登入以查看個人資料");
    } else {
      // Fetch live data from API
      fetch("api/profile.php", { credentials: "same-origin" })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            // Update localStorage with fresh data
            localStorage.setItem("lensrent_user", JSON.stringify(data.member));
            renderProfile(data.member, data.orders);
          } else {
            // API session expired, fall back to localStorage data
            renderProfile(localUser, []);
          }
        })
        .catch(() => {
          // Backend unreachable, show localStorage data
          renderProfile(localUser, []);
        });
    }

    // Logout
    document.getElementById("btn-logout").addEventListener("click", () => {
      localStorage.removeItem("lensrent_user");
      fetch("api/logout.php", { credentials: "same-origin" }).catch(() => {});
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
