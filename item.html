<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>器材詳情 — 10gear 拾光機</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
  <style>
    .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 24px; }

    /* Image box: fixed 4:3 aspect ratio */
    .item-image-box {
      position: relative; width: 100%; aspect-ratio: 4 / 3;
      background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden;
    }
    .item-image-box img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain; padding: 20px;
    }
    .item-image-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 90px;
    }

    /* Specs table */
    .specs-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .specs-table tr { border-bottom: 1px solid var(--border); }
    .specs-table tr:last-child { border-bottom: none; }
    .specs-table td { padding: 8px 4px; vertical-align: top; }
    .specs-table td:first-child {
      width: 38%; color: var(--t3); font-weight: 500; padding-right: 12px; white-space: nowrap;
    }
    .specs-table td:last-child { color: var(--t1); }

    .item-price-box {
      padding: 16px 20px; background: var(--amber-light);
      border: 1px solid rgba(217,119,6,0.2); border-radius: 10px;
    }
    .item-price-label { font-size: 11px; color: var(--amber-text); margin-bottom: 2px; }
    .item-price-value { font-size: 32px; font-weight: 700; color: var(--amber); line-height: 1; }
    .item-price-unit { font-size: 14px; font-weight: 400; color: var(--amber-text); }
    .item-info-panel { display: flex; flex-direction: column; gap: 18px; }
    .item-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .badge-state { position: static !important; }
    .item-name { font-size: 24px; font-weight: 700; color: var(--t1); margin: 0; }
    .item-model { font-size: 14px; color: var(--t2); margin-top: 4px; }
    .item-actions { display: flex; flex-direction: column; gap: 8px; }
    .breadcrumb { font-size: 12px; color: var(--t3); margin-bottom: 18px; }
    .breadcrumb a { color: var(--t3); }
    .breadcrumb a:hover { color: var(--t1); }
    @media (max-width: 680px) {
      .item-grid { grid-template-columns: 1fr; gap: 20px; }
      .item-price-value { font-size: 26px; }
      .item-name { font-size: 20px; }
    }
  </style>
</head>
<body>

  <!-- ══ TOP UTILITY BAR ═══════════════════════════════════════════════════ -->
  <div class="utility-bar">
    <div class="container">
      <span>攝影器材租賃平台 · 全站器材皆有保險保障</span>
      <div class="utility-bar__links"><span>客服中心</span><span class="utility-bar__sep">|</span><span>出租方專區</span></div>
    </div>
  </div>

  <!-- ══ MAIN HEADER ═══════════════════════════════════════════════════════ -->
  <header class="main-header">
    <div class="container">
      <div class="header-row">
        <a href="index.html" class="logo" style="text-decoration:none;"><img src="logo.png" alt="10gear" class="logo__img"><div class="logo__names"><span class="logo__zh">拾光機</span><span class="logo__en">10gear</span></div></a>
        <div style="flex:1;"></div>
        <div class="header-actions">
          <div id="auth-buttons"></div>
          <a href="cart.html" class="btn-cart" style="text-decoration:none;">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            購物車
            <span class="cart-badge" id="cart-badge">0</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- ══ MAIN CONTENT ══════════════════════════════════════════════════════ -->
  <main class="container" style="padding-top:28px; padding-bottom:56px;">
    <div id="item-content">
      <div style="text-align:center;padding:80px 20px;color:var(--t3);">
        
        <p>載入器材資料中⋯</p>
      </div>
    </div>
  </main>

  <!-- ══ TOAST ═════════════════════════════════════════════════════════════ -->
  <div class="toast" id="toast"></div>

  <script src="js/item.js"></script>
</body>
</html>
